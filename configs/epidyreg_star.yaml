# epiDyReg-STAR (full v1, per spec Section 21).
# = STAR backbone + multi-source dynamic graph (static + return-corr + residual-corr)
#   with regime-conditioned source mixing + age-aware graph rules
#   + episodic retrieval with richer (regime + cs + graph-summary) keys.

train:
  panel_start: "2015-01-09"
  panel_end: "2022-12-31"
  horizon_days: 5
  universe_csv: "data/raw/biotech_universe_v1.csv"
  epochs: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  grad_clip: 1.0
  early_stop_patience: 3
  correlation_window: 60
  min_age_for_corr_edges: 60
  output_dir: "results/epidyreg_star"

backbone:
  feature_dim: 22
  hidden_dim: 128
  num_neighbors: 8
  temporal_window: 20
  num_heads: 4
  num_layers: 2
  ff_dim: 256
  dropout: 0.1

memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  retrieval_mode: "raw_key"
  random_retrieval: false

mixer:
  hidden_dim: 64
  num_sources: 3   # static, rolling return-corr, rolling residual-corr

model:
  episode_value_dim: 32   # set automatically from values
  cross_attn_heads: 4
  gate_hidden_dim: 64
  head_hidden_dim: 64
  head_dropout: 0.1

ablation:
  disable_gate: false
  disable_retrieval: false
