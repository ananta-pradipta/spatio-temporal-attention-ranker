# EFR-DGraph-epiSTAR: Episodic Factor-Repriced Duration-Graph epiSTAR.
# OW-epiSTAR + duration graph + episodic factor-repricing memory + IC + tail-pair losses.
# Spec: docs/specs/efr_dgraph_epistar_implementation_prompt.md

train:
  panel_start: "2015-01-09"
  panel_end: "2022-12-31"
  horizon_days: 5
  universe_csv: "data/raw/biotech_universe_v1.csv"
  epochs: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  grad_clip: 1.0
  early_stop_patience: 3
  correlation_window: 60
  correlation_shrinkage_tau: 30.0
  min_overlap_absolute: 5
  output_dir: "results/efr_dgraph_epistar"
  use_duration_graph: true
  fixed_w_corr: 0.7
  fixed_w_duration: 0.3
  random_ipo_retrieval: false
  disable_correlation_shrinkage: false

backbone:
  feature_dim: 22
  hidden_dim: 128
  num_neighbors: 8
  temporal_window: 20
  num_heads: 4
  num_layers: 2
  ff_dim: 256
  dropout: 0.1

day_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  retrieval_mode: "raw_key"
  random_retrieval: false

ipo_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  max_age_days: 756
  random_retrieval: false

model:
  episode_value_dim: 32
  ipo_value_dim: 32
  cross_attn_heads: 4
  gate_hidden_dim: 64
  head_hidden_dim: 64
  head_dropout: 0.1

macro:
  input_dim: 28
  hidden_dim: 64
  out_dim: 32
  dropout: 0.1

efr:
  enabled: true
  n_retrieved_days: 16
  ridge_eta: 0.25
  retrieval_temperature: 0.20
  min_lambda: 0.05
  max_lambda: 0.30
  factor_clip: 5.0
