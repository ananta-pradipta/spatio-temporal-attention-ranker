# OW-epiSTAR v1: focused survivorship-aware extension of epiSTAR-full.
# Differs from v0 (configs/ow_epistar.yaml) in five places:
#   1. tradable_mask + label_mask + loss_mask separation (not the
#      old conflated active mask).
#   2. Age features computed from tradable_mask (cumsum semantics)
#      so early-life cells of late IPOs are preserved.
#   3. Reliability-shrunk dynamic graph counted on tradable_mask.
#   4. 22-dim IPO retrieval key (8 age/history + 11 panel + 3 macro).
#   5. 11-dim IPO retrieval gate matching spec Section E exactly.

train:
  panel_start: "2015-01-09"
  panel_end: "2022-12-31"
  horizon_days: 5
  universe_csv: "data/raw/biotech_universe_v1.csv"
  epochs: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  grad_clip: 1.0
  early_stop_patience: 3
  correlation_window: 60
  correlation_shrinkage_tau: 30.0
  min_overlap_absolute: 5
  output_dir: "results/ow_epistar_v1"
  # Ablation flags (Section H of the spec).
  disable_ipo_retrieval: false
  disable_ipo_gate: false
  disable_correlation_shrinkage: false
  random_ipo_retrieval: false
  shuffle_age_features: false

backbone:
  feature_dim: 22
  hidden_dim: 128
  num_neighbors: 8
  temporal_window: 20
  num_heads: 4
  num_layers: 2
  ff_dim: 256
  dropout: 0.1

day_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  retrieval_mode: "raw_key"
  random_retrieval: false

ipo_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  max_age_days: 756
  random_retrieval: false

model:
  episode_value_dim: 32
  ipo_value_dim: 32
  cross_attn_heads: 4
  gate_hidden_dim: 64
  head_hidden_dim: 64
  head_dropout: 0.1
