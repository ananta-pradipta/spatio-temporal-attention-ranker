# DOW-epiSTAR v2.2: Duration-Aware Open-World epiSTAR (full).
# v2.0 = OW-epiSTAR v1 + additive macro-duration head (Section E).
# v2.1 = + rate-shock memory (Section F).
# v2.2 = + duration-aware graph fallback (Section G, A_corr + A_duration).
# The full A_corr + A_resid + A_duration graph is deferred to v2.3.

train:
  panel_start: "2015-01-09"
  panel_end: "2022-12-31"
  horizon_days: 5
  universe_csv: "data/raw/biotech_universe_v1.csv"
  epochs: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  grad_clip: 1.0
  early_stop_patience: 3
  correlation_window: 60
  correlation_shrinkage_tau: 30.0
  min_overlap_absolute: 5
  output_dir: "results/dow_epistar_v2"
  disable_macro_duration: false
  disable_lambda_macro: false
  disable_score_duration: false
  shuffle_macro_state: false
  shuffle_duration_input: false
  random_ipo_retrieval: false
  shuffle_age_features: false
  disable_correlation_shrinkage: false
  use_rate_memory: true
  disable_alpha_rate: false
  disable_score_rate: false
  random_rate_retrieval: false
  use_duration_graph: true
  duration_graph_min_warmup_days: 252

backbone:
  feature_dim: 22
  hidden_dim: 128
  num_neighbors: 8
  temporal_window: 20
  num_heads: 4
  num_layers: 2
  ff_dim: 256
  dropout: 0.1

day_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  retrieval_mode: "raw_key"
  random_retrieval: false

ipo_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  max_age_days: 756
  random_retrieval: false

rate_memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  random_retrieval: false

model:
  episode_value_dim: 32
  ipo_value_dim: 32
  cross_attn_heads: 4
  gate_hidden_dim: 64
  head_hidden_dim: 64
  head_dropout: 0.1
  duration_dim: 32
  duration_hidden_dim: 64
  duration_dropout: 0.1
  macro_dim: 32
  macro_hidden_dim: 64
  macro_gate_state_dim: 16
  macro_dropout: 0.1
