# epiSTAR-SBP v1: Survivorship-Bias Patch on epiSTAR-full.
# Adds (a) cohort-augmented 18-dim regime key (14-dim base + 4-dim cohort),
# (b) dual-pool retrieval (M1=5 raw + M2=3 cohort-near), (c) two-head cross-
# attention with mu mixing, (d) per-ticker confidence gate with Beta(2,2)
# prior, (e) IRF-reweighted MSE term, (f) V-REx penalty across cohort
# environments. Loss-side ramp: lambda_vrex 0 -> 5 over the first 10
# epochs.

train:
  panel_start: "2015-01-09"
  panel_end: "2022-12-31"
  horizon_days: 5
  universe_csv: "data/raw/biotech_universe_v1.csv"
  epochs: 12
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  grad_clip: 1.0
  early_stop_patience: 4
  correlation_window: 60
  output_dir: "results/epistar_sbp"
  lambda_irf: 1.0
  lambda_vrex: 5.0
  lambda_alpha_prior: 0.01
  irf_temper: 0.5
  vrex_warmup_epochs: 10
  cohort_num_buckets: 4

backbone:
  feature_dim: 22
  hidden_dim: 128
  num_neighbors: 8
  temporal_window: 20
  num_heads: 4
  num_layers: 2
  ff_dim: 256
  dropout: 0.1

memory:
  top_m: 8
  horizon_days: 5
  embargo_days: 5
  retrieval_mode: "raw_key"
  random_retrieval: false

model:
  cohort_dim: 4
  dual_pool_m1: 5
  dual_pool_m2: 3
  tau_cohort: 0.4
  episode_value_dim: 32
  cross_attn_heads: 4
  gate_hidden_dim: 64
  head_hidden_dim: 64
  head_dropout: 0.1

ablation:
  use_per_ticker_gate: true
  use_two_head_xattn: true
  use_dual_pool: true
  disable_retrieval: false
